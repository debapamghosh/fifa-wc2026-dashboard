document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

p:0; left:0; height:3px; width:100%; transform:scaleX(0); transform-origin:0 50%; background:#A6402F; z-index:50;\"><\u002Fdiv>\n\n  <!-- ============ HERO ============ -->\n  <header data-screen-label=\"Hero\" style=\"max-width:1080px; margin:0 auto; padding:80px 28px 64px; min-height:100vh; display:flex; flex-direction:column; justify-content:center; position:relative;\">\n    <div style=\"display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:30px;\">\n      <span style=\"width:30px; height:1px; background:#A6402F;\"><\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:.7rem; letter-spacing:.24em; text-transform:uppercase; color:#A6402F;\">FIFA World Cup 2026 &nbsp;·&nbsp; Group C &nbsp;·&nbsp; Match 7<\u002Fspan>\n      <span style=\"width:30px; height:1px; background:#A6402F;\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; align-items:center; justify-content:center; gap:clamp(22px,6vw,76px); margin:6px 0 40px;\">\n      <div style=\"text-align:right; flex:1;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:.74rem; letter-spacing:.18em; color:#6E665A; margin-bottom:6px;\">🇧🇷 &nbsp;BRA<\u002Fdiv>\n        <div style=\"font-family:'Libre Caslon Display',Georgia,serif; font-size:clamp(22px,3vw,32px); color:#1F7A5C; line-height:1;\">Brazil<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:clamp(14px,3vw,30px); line-height:.86;\">\n        <span style=\"font-family:'Libre Caslon Display',Georgia,serif; font-size:clamp(74px,15vw,158px); color:#1F7A5C;\">{{ scoreHome }}<\u002Fspan>\n        <span style=\"font-family:'Libre Caslon Display',Georgia,serif; font-size:clamp(48px,8vw,90px); color:#C9BFAC;\">–<\u002Fspan>\n        <span style=\"font-family:'Libre Caslon Display',Georgia,serif; font-size:clamp(74px,15vw,158px); color:#8A3A20;\">{{ scoreAway }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"text-align:left; flex:1;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:.74rem; letter-spacing:.18em; color:#6E665A; margin-bottom:6px;\">MAR &nbsp;🇲🇦<\u002Fdiv>\n        <div style=\"font-family:'Libre Caslon Display',Georgia,serif; font-size:clamp(22px,3vw,32px); color:#8A3A20; line-height:1;\">Morocco<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"text-align:center; max-width:880px; margin:0 auto;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.3em; text-transform:uppercase; color:#A6402F; margin-bottom:18px;\">Beyond the Scoreline<\u002Fdiv>\n      <h1 style=\"font-family:'Libre Caslon Display',Georgia,serif; font-weight:400; font-size:clamp(42px,8.5vw,92px); line-height:1.02; letter-spacing:-.01em; margin:0 0 24px; text-wrap:balance; color:#211C15;\">Two Ideas, One Draw<\u002Fh1>\n      <p style=\"font-family:'Spectral',Georgia,serif; font-style:italic; font-size:clamp(18px,2.4vw,23px); line-height:1.5; color:#4A443C; max-width:620px; margin:0 auto; text-wrap:pretty;\">Brazil controlled the tempo. Morocco controlled the danger. The scoreboard was the only balanced thing about this match.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:auto; padding-top:48px; display:flex; flex-direction:column; align-items:center; gap:14px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:.66rem; letter-spacing:.12em; text-transform:uppercase; color:#6E665A;\">13 June 2026 &nbsp;·&nbsp; 20:00 &nbsp;·&nbsp; MetLife Stadium, East Rutherford<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:.62rem; letter-spacing:.18em; color:#A6402F; animation:btsBob 2.4s ease-in-out infinite;\">▼<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ SECTION 2 — OPENING STORY ============ -->\n  <section data-screen-label=\"Opening Story\" style=\"max-width:760px; margin:0 auto; padding:70px 28px;\">\n    <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:34px;\">\n      <span style=\"width:34px; height:1px; background:#A6402F;\"><\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:#A6402F;\">The Opening Story<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-family:'Libre Caslon Display',Georgia,serif; font-size:clamp(30px,5.2vw,52px); line-height:1.14; color:#211C15; margin-bottom:34px; text-wrap:balance;\">\n      <div>The scoreboard suggested balance.<\u002Fdiv>\n      <div style=\"color:#1F7A5C; display:inline;\">Brazil&nbsp;1.<\u002Fdiv>&nbsp;<div style=\"color:#8A3A20; display:inline;\">Morocco&nbsp;1.<\u002Fdiv>\n      <div style=\"color:#6E665A; font-style:italic; margin-top:8px;\">But this was never a balanced match.<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.2rem; line-height:1.72; color:#33302A; max-width:64ch; margin:0 0 14px;\">Brazil had more of the ball. They completed more passes, at a higher accuracy. They built patiently and progressed calmly — and finished with an xG of 0.99, barely below their single goal.<\u002Fp>\n    <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.2rem; line-height:1.72; color:#33302A; max-width:64ch; margin:0 0 40px;\">Morocco spent their match compressed, narrow, waiting. And they finished with 1.33 expected goals — the more dangerous side by the only currency that truly matters.<\u002Fp>\n\n    {{ contradictionStrip }}\n\n    <blockquote style=\"margin:48px 0 0; padding:0; text-align:center;\">\n      <p style=\"font-family:'Libre Caslon Display',Georgia,serif; font-size:clamp(26px,4.4vw,42px); line-height:1.22; color:#A6402F; margin:0; text-wrap:balance;\">Brazil built the game.<br>Morocco found the cracks.<\u002Fp>\n    <\u002Fblockquote>\n  <\u002Fsection>\n\n  <div style=\"height:1px; max-width:880px; margin:0 auto; background:#D8CFBD;\"><\u002Fdiv>\n\n  <!-- ============ SECTION 3 — THE NUMBERS ============ -->\n  <section data-screen-label=\"The Numbers\" style=\"max-width:880px; margin:0 auto; padding:74px 28px;\">\n    <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:26px;\">\n      <span style=\"width:34px; height:1px; background:#A6402F;\"><\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:#A6402F;\">The Numbers Behind the Game<\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Libre Caslon Display',Georgia,serif; font-weight:400; font-size:clamp(30px,5vw,48px); line-height:1.08; margin:0 0 18px; text-wrap:balance;\">Strip the result away, and the stat sheet reads like a Morocco win.<\u002Fh2>\n    <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.18rem; line-height:1.7; color:#33302A; max-width:62ch; margin:0 0 38px;\">The truth of this match is hidden in <em>which<\u002Fem> numbers Brazil chose to win — and which were quietly won by the team in red.<\u002Fp>\n\n    <div style=\"display:flex; align-items:center; gap:24px; margin:0 0 40px; font-family:'IBM Plex Mono',monospace; font-size:.66rem; letter-spacing:.12em; text-transform:uppercase; color:#6E665A;\">\n      <span style=\"display:flex; align-items:center; gap:8px;\"><span style=\"width:14px; height:14px; border-radius:3px; background:#5DA882;\"><\u002Fspan> Brazil<\u002Fspan>\n      <span style=\"display:flex; align-items:center; gap:8px;\"><span style=\"width:14px; height:14px; border-radius:3px; background:#C4643C;\"><\u002Fspan> Morocco<\u002Fspan>\n    <\u002Fdiv>\n\n    {{ statSection }}\n  <\u002Fsection>\n\n  <div style=\"height:1px; max-width:880px; margin:0 auto; background:#D8CFBD;\"><\u002Fdiv>\n\n  <!-- ============ SECTION 4 — TACTICAL BATTLE ============ -->\n  <section data-screen-label=\"Tactical Battle\" style=\"max-width:980px; margin:0 auto; padding:74px 28px;\">\n    <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:26px;\">\n      <span style=\"width:34px; height:1px; background:#A6402F;\"><\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:#A6402F;\">The Tactical Battle<\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Libre Caslon Display',Georgia,serif; font-weight:400; font-size:clamp(30px,5vw,48px); line-height:1.08; margin:0 0 14px; text-wrap:balance;\">Brazil built phases. Morocco built traps.<\u002Fh2>\n    <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.18rem; line-height:1.7; color:#33302A; max-width:62ch; margin:0 0 44px;\">Phases of play, as a share of each side's match. One team built to dominate rhythm. The other built a room with one exit — and stood in the doorway waiting for Brazil to walk through it.<\u002Fp>\n\n    {{ phaseChart }}\n\n    <div style=\"margin:54px 0 0; padding:36px 30px; background:#ECE4D3; border:1px solid #DCD2BF; border-radius:3px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:.66rem; letter-spacing:.16em; text-transform:uppercase; color:#6E665A; margin-bottom:22px;\">Where each team defended — share of match by block height<\u002Fdiv>\n      {{ blockDiagram }}\n      <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.1rem; line-height:1.68; color:#33302A; max-width:64ch; margin:26px 0 0;\">Morocco spent <strong>51% of their out-of-possession time in a mid-block<\u002Fstrong> — a disciplined, narrow compact shape designed not to stop the ball, but to stop the pass that mattered. When they won it back, 16% of Morocco's possession became attacking transitions, the highest in Group C. They compressed, they waited, and they ran.<\u002Fp>\n    <\u002Fdiv>\n\n    <blockquote style=\"margin:50px 0 0; text-align:center;\">\n      <p style=\"font-family:'Libre Caslon Display',Georgia,serif; font-size:clamp(24px,4vw,38px); line-height:1.22; color:#A6402F; margin:0; text-wrap:balance;\">Brazil's shape said control.<br>Morocco's shape said opportunity.<\u002Fp>\n    <\u002Fblockquote>\n  <\u002Fsection>\n\n  <div style=\"height:1px; max-width:880px; margin:0 auto; background:#D8CFBD;\"><\u002Fdiv>\n\n  <!-- ============ SECTION 5 — THE GEOMETRY PROBLEM ============ -->\n  <section data-screen-label=\"The Geometry Problem\" style=\"max-width:980px; margin:0 auto; padding:74px 28px;\">\n    <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:26px;\">\n      <span style=\"width:34px; height:1px; background:#A6402F;\"><\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:#A6402F;\">The Geometry Problem<\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Libre Caslon Display',Georgia,serif; font-weight:400; font-size:clamp(30px,5vw,48px); line-height:1.08; margin:0 0 14px; text-wrap:balance;\">Why Casemiro and Bruno could not control the match.<\u002Fh2>\n    <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.18rem; line-height:1.7; color:#33302A; max-width:62ch; margin:0 0 18px;\">Brazil expected Casemiro to protect, win the ball, and provide defensive balance. They expected Bruno to control tempo, progress the ball, and pass vertically. Both qualities were present. The problem was that two controllers on the same horizontal line leave no connector between them — and Morocco knew exactly where that gap lived.<\u002Fp>\n    <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.18rem; line-height:1.7; color:#33302A; max-width:62ch; margin:0 0 44px;\">Morocco allowed Brazil's first pass. Then blocked the next one. The open space that remained was exactly where Saibari chose to run.<\u002Fp>\n\n    {{ tacticalSection }}\n\n    <div style=\"margin-top:54px; padding:36px 30px; background:#ECE4D3; border:1px solid #DCD2BF; border-radius:3px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:.7rem; letter-spacing:.16em; text-transform:uppercase; color:#6E665A; margin-bottom:16px;\">Morocco's Defensive Trap<\u002Fdiv>\n      <h3 style=\"font-family:'Libre Caslon Display',Georgia,serif; font-weight:400; font-size:clamp(22px,3.5vw,34px); line-height:1.12; margin:0 0 16px; color:#211C15;\">Morocco did not stop Brazil having the ball. They stopped Brazil becoming dangerous.<\u002Fh3>\n      <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.1rem; line-height:1.68; color:#33302A; max-width:64ch; margin:0;\">Their 4-1-4-1 block protected the central zones with Amrabat as the pivot anchor — forcing Brazil wide, denying vertical connections, and turning every Brazilian progression into a wide delivery that met a crowded Morocco backline. The block was not passive. It was a deliberate structural invitation: <em>build all you want, just not through here<\u002Fem>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"height:1px; max-width:880px; margin:0 auto; background:#D8CFBD;\"><\u002Fdiv>\n\n  <!-- ============ SECTION 6 — ATTACKING ANALYSIS ============ -->\n  <section data-screen-label=\"Attacking Analysis\" style=\"max-width:880px; margin:0 auto; padding:74px 28px;\">\n    <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:26px;\">\n      <span style=\"width:34px; height:1px; background:#A6402F;\"><\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:#A6402F;\">Where The Match Was Won<\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Libre Caslon Display',Georgia,serif; font-weight:400; font-size:clamp(30px,5vw,48px); line-height:1.08; margin:0 0 14px; text-wrap:balance;\">Twelve shots. Fourteen shots. One goal each.<\u002Fh2>\n    <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.18rem; line-height:1.7; color:#33302A; max-width:62ch; margin:0 0 44px;\">Brazil took twelve shots and scored once — five on target, a goal and four saves. Morocco took fourteen shots and also scored once — three on target, carrying higher individual xG. One team created more attempts. The other created more danger per attempt.<\u002Fp>\n\n    {{ attackSplit }}\n\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:.66rem; letter-spacing:.16em; text-transform:uppercase; color:#6E665A; margin:54px 0 16px;\">Every attempt, by the minute<\u002Fdiv>\n    {{ shotTimeline }}\n  <\u002Fsection>\n\n  <div style=\"height:1px; max-width:880px; margin:0 auto; background:#D8CFBD;\"><\u002Fdiv>\n\n  <!-- ============ SECTION 7 — PLAYER INTELLIGENCE ============ -->\n  <section data-screen-label=\"Player Intelligence\" style=\"max-width:1040px; margin:0 auto; padding:74px 28px;\">\n    <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:26px;\">\n      <span style=\"width:34px; height:1px; background:#A6402F;\"><\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:#A6402F;\">Player Intelligence<\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Libre Caslon Display',Georgia,serif; font-weight:400; font-size:clamp(30px,5vw,48px); line-height:1.08; margin:0 0 14px; text-wrap:balance;\">Vinícius scored. Others decided the match.<\u002Fh2>\n    <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.18rem; line-height:1.7; color:#33302A; max-width:62ch; margin:0 0 44px;\">The goal is easy to see. The hidden architecture — the engine, the foundation, the connector — lives in the line-break and progression columns. Several of them wore red.<\u002Fp>\n\n    {{ playerCards }}\n  <\u002Fsection>\n\n  <div style=\"height:1px; max-width:880px; margin:0 auto; background:#D8CFBD;\"><\u002Fdiv>\n\n  <!-- ============ SECTION 8 — MATCH DNA ============ -->\n  <section data-screen-label=\"Match DNA\" style=\"max-width:980px; margin:0 auto; padding:74px 28px;\">\n    <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:26px;\">\n      <span style=\"width:34px; height:1px; background:#A6402F;\"><\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:#A6402F;\">Match DNA<\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Libre Caslon Display',Georgia,serif; font-weight:400; font-size:clamp(30px,5vw,48px); line-height:1.08; margin:0 0 14px; text-wrap:balance;\">Two profiles. One shared point.<\u002Fh2>\n    <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.18rem; line-height:1.7; color:#33302A; max-width:62ch; margin:0 0 16px;\">Brazil's dominance in possession control against Morocco's superiority in every danger metric — mapped across six dimensions.<\u002Fp>\n\n    <div style=\"display:flex; flex-wrap:wrap; gap:40px; align-items:center; justify-content:center; margin:36px 0 0;\">\n      <div style=\"flex:0 1 380px; display:flex; justify-content:center;\">{{ radar }}<\u002Fdiv>\n      <div style=\"flex:1 1 360px; min-width:300px;\">{{ dnaStars }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SECTION 9 — FINAL VERDICT ============ -->\n  <section data-screen-label=\"The Final Verdict\" style=\"background:#211C15; color:#F4EFE4; margin-top:40px;\">\n    <div style=\"max-width:760px; margin:0 auto; padding:96px 28px 104px; text-align:center;\">\n      <div style=\"display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:40px;\">\n        <span style=\"width:34px; height:1px; background:#C97B5E;\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:#C97B5E;\">The Final Verdict<\u002Fspan>\n        <span style=\"width:34px; height:1px; background:#C97B5E;\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'Libre Caslon Display',Georgia,serif; font-size:clamp(34px,6vw,62px); line-height:1.1; margin-bottom:40px; text-wrap:balance;\">\n        <div>Brazil's problem was not talent.<\u002Fdiv>\n        <div style=\"color:#E9C9A0;\">It was geometry.<\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-family:'Spectral',Georgia,serif; font-size:1.18rem; line-height:1.74; color:#CFC7B8; max-width:56ch; margin:0 auto 44px;\">Morocco did not beat Brazil's players. They beat Brazil's connections. The Seleção controlled the phases and lost the spaces. Morocco controlled the spaces and found the goal. The draw was fair to the scoreboard. It was not entirely fair to Morocco.<\u002Fp>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:.64rem; letter-spacing:.2em; text-transform:uppercase; color:#7C7464;\">Beyond the Scoreline &nbsp;·&nbsp; FIFA WC 2026 Intelligence<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"max-width:880px; margin:0 auto; padding:34px 28px 56px; text-align:center;\">\n    <p style=\"font-family:'IBM Plex Mono',monospace; font-size:.62rem; letter-spacing:.08em; line-height:1.8; color:#9A9080; margin:0;\">Source: FIFA Post Match Summary Report (PMSR-M07-BRA-V-MAR). Key match statistics extracted from FIFA PMSR. Player-level granular stats estimated from match context. Tactical interpretation is editorial.<\u002Fp>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  state = { ready: false };\n\n  serif = \"'Libre Caslon Display',Georgia,serif\";\n  body  = \"'Spectral',Georgia,serif\";\n  mono  = \"'IBM Plex Mono',monospace\";\n  ink   = \"#211C15\";\n  ink2  = \"#6E665A\";\n  line  = \"#D8CFBD\";\n  paper = \"#F4EFE4\";\n  accent= \"#A6402F\";\n\n  alpha(hex, a){\n    const h = hex.replace('#','');\n    const r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);\n    return `rgba(${r},${g},${b},${a})`;\n  }\n\n  async componentDidMount(){\n    if(!window.MATCH_DATA){\n      try { await import('./data/brazil-morocco-data.js'); } catch(e){ console.error('data load failed', e); }\n    }\n    this.setState({ ready: true });\n    const bar = document.getElementById('bts-progress');\n    if(bar){\n      const onScroll = () => {\n        const h = document.documentElement.scrollHeight - window.innerHeight;\n        const p = h > 0 ? Math.min(1, window.scrollY / h) : 0;\n        bar.style.transform = 'scaleX(' + p + ')';\n      };\n      window.addEventListener('scroll', onScroll, { passive: true });\n      onScroll();\n      this._onScroll = onScroll;\n    }\n  }\n  componentWillUnmount(){ if(this._onScroll) window.removeEventListener('scroll', this._onScroll); }\n\n  useInView = () => {\n    const ref = React.useRef(null);\n    const [seen, setSeen] = React.useState(false);\n    React.useEffect(() => {\n      if(seen) return;\n      const el = ref.current; if(!el) return;\n      const check = () => {\n        const r = el.getBoundingClientRect();\n        const vh = window.innerHeight || document.documentElement.clientHeight;\n        if(r.top < vh * 0.92 && r.bottom > 0){ setSeen(true); return true; }\n        return false;\n      };\n      if(check()) return;\n      const onScroll = () => { if(check()){ cleanup(); } };\n      const cleanup = () => {\n        window.removeEventListener('scroll', onScroll);\n        window.removeEventListener('resize', onScroll);\n        clearTimeout(t);\n      };\n      window.addEventListener('scroll', onScroll, { passive: true });\n      window.addEventListener('resize', onScroll);\n      const t = setTimeout(check, 350);\n      return cleanup;\n    }, [seen]);\n    return [ref, seen];\n  };\n\n  CountUp = ({ to, decimals = 0, suffix = '', style }) => {\n    const [ref, seen] = this.useInView();\n    const [val, setVal] = React.useState(0);\n    React.useEffect(() => {\n      if(!seen) return;\n      const dur = 1100, start = Date.now();\n      const id = setInterval(() => {\n        const p = Math.min(1, (Date.now() - start) / dur);
